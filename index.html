<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamshid & Shahzoda — To'y Taklifi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9920A; --gold-bright: #F0C040; --navy: #080C1A; --gold-pale: #E8D5A3;
}
body { background: var(--navy); color: var(--gold-pale); font-family: 'Raleway', sans-serif; margin: 0; overflow-x: hidden; text-align: center; }
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* Kirish ekrani */
#overlay {
  position: fixed; inset: 0; z-index: 200; background: var(--navy);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: opacity 0.8s ease;
}
.lang-switch-top { position: fixed; top: 20px; left: 20px; z-index: 150; }
.lang-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; cursor: pointer; margin-right: 5px; border-radius: 4px; }
.lang-btn.active { background: var(--gold); color: white; }

#musicBtn {
  position: fixed; top: 20px; right: 20px; z-index: 150;
  width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--gold);
  background: rgba(8,12,26,0.8); color: var(--gold-bright); cursor: pointer;
}

.hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 1; padding: 20px; }
h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 6rem); color: var(--gold-bright); margin: 20px 0; }
.date { font-size: 1.5rem; letter-spacing: 4px; color: var(--gold); }

.card { background: rgba(13,21,48,0.8); border: 1px solid rgba(201,146,10,0.3); padding: 30px; margin: 40px auto; max-width: 450px; position: relative; z-index: 1; }
.btn { display: inline-block; padding: 15px 30px; border: 1px solid var(--gold); color: var(--gold-bright); text-decoration: none; margin-top: 20px; transition: 0.3s; }
</style>
</head>
<body>

<div id="overlay">
  <h2 id="ov-title">Jamshid & Shahzoda</h2>
  <p id="ov-text">TAKLIFAY NOMANI OCHISH / OTKRIT PRIGLASHENIE</p>
</div>

<div class="lang-switch-top">
  <button class="lang-btn active" onclick="setLang('uz')">UZB</button>
  <button class="lang-btn" onclick="setLang('ru')">RUS</button>
</div>

<button id="musicBtn">🕯</button>
<canvas id="bgCanvas"></canvas>

<section class="hero">
  <p id="txt-welcome" style="letter-spacing: 5px; text-transform: uppercase;">Taklifnoma</p>
  <h1>Jamshid & Shahzoda</h1>
  <p class="date">25 . 04 . 2026</p>
</section>

<section>
  <div class="card">
    <h3 id="txt-location-title">Manzil</h3>
    <p>Yakkasaroy Palace</p>
    <p id="txt-time">Soat 18:30</p>
    <a href="https://t.me/KKadirov" class="btn" id="txt-confirm">Tashrifni tasdiqlash</a>
  </div>
</section>

<script>
const translations = {
  uz: {
    welcome: "Taklifnoma",
    location: "Manzil",
    time: "Soat 18:30",
    confirm: "Tashrifni tasdiqlash",
    overlay: "TAKLIFAY NOMANI OCHISH"
  },
  ru: {
    welcome: "Приглашение",
    location: "Место проведения",
    time: "Время 18:30",
    confirm: "Подтвердить присутствие",
    overlay: "ОТКРЫТЬ ПРИГЛАШЕНИЕ"
  }
};

function setLang(lang) {
  document.getElementById('txt-welcome').innerText = translations[lang].welcome;
  document.getElementById('txt-location-title').innerText = translations[lang].location;
  document.getElementById('txt-time').innerText = translations[lang].time;
  document.getElementById('txt-confirm').innerText = translations[lang].confirm;
  
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.innerText.toLowerCase() === lang);
  });
}

// Musiqa tizimi (Yangi, yoqimli pianino ohangi)
let audioCtx = null, playing = false;
function playMusic() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  playing = true;
  const gain = audioCtx.createGain(); gain.connect(audioCtx.destination); gain.gain.value = 0.1;
  
  const notes = [261.63, 329.63, 392.00, 523.25]; // Do-Mi-Sol-Do (Klassik)
  setInterval(() => {
    if(!playing) return;
    let now = audioCtx.currentTime;
    notes.forEach((f, i) => {
      let osc = audioCtx.createOscillator();
      let g = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(f, now + i*0.5);
      g.gain.setValueAtTime(0, now + i*0.5);
      g.gain.linearRampToValueAtTime(0.1, now + i*0.5 + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, now + i*0.5 + 0.8);
      osc.connect(g); g.connect(gain);
      osc.start(now + i*0.5); osc.stop(now + i*0.5 + 1);
    });
  }, 4000);
}

document.getElementById('overlay').addEventListener('click', function() {
  this.style.opacity = '0';
  setTimeout(() => this.remove(), 800);
  playMusic();
  document.getElementById('musicBtn').innerText = '🔇';
});

document.getElementById('musicBtn').addEventListener('click', function() {
  playing = !playing;
  this.innerText = playing ? '🔇' : '🕯';
});

// Fon animatsiyasi
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let sparks = Array.from({length: 40}, () => ({ x: Math.random(), y: Math.random(), s: Math.random()*2 }));
function draw() {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  ctx.fillStyle = '#080C1A'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#F0C040';
  sparks.forEach(s => {
    s.y -= 0.001; if(s.y < 0) s.y = 1;
    ctx.beginPath(); ctx.arc(s.x*canvas.width, s.y*canvas.height, s.s, 0, Math.PI*2); ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
